<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A small collection of browser games — built with heart." />
  <title>Games — play in your browser</title>

  <!-- icons + browser chrome -->
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <meta name="theme-color" content="#ffffff" />

  <!-- social previews (Open Graph + Twitter) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.niklaslifors.com/games/" />
  <meta property="og:title" content="Games — play in your browser" />
  <meta property="og:description" content="A small collection of original browser games — built with heart." />
  <meta property="og:image" content="https://www.niklaslifors.com/games/assets/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Games — play in your browser" />
  <meta name="twitter:description" content="A small collection of original browser games — built with heart." />
  <meta name="twitter:image" content="https://www.niklaslifors.com/games/assets/og-image.png" />

  <!-- self-hosted fonts (no third-party request) -->
  <link rel="stylesheet" href="css/fonts.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="#top">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-name">Games</span>
    </a>
    <nav class="site-nav" id="site-nav" aria-label="Game list"></nav>
  </header>

  <main id="top">
    <section class="hero">
      <p class="hero-eyebrow">A small arcade</p>
      <h1 class="hero-title">We make the games<br />we want to play.</h1>
      <p class="hero-sub">Original browser games — no installs, no accounts. Scroll down and pick one.</p>
      <a class="hero-scroll" href="#games" aria-label="Jump to games">
        <span>Browse games</span>
        <span class="hero-arrow" aria-hidden="true">↓</span>
      </a>
    </section>

    <div id="games" class="games"></div>
  </main>

  <footer class="site-footer">
    <p class="footer-line">Made with heart — and a lot of <code>requestAnimationFrame</code>.</p>
    <p class="footer-meta">&copy; <span id="year"></span> Games. All play, no work.</p>
  </footer>

  <script src="js/games.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
