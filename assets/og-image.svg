  <text x="92" y="424" font-size="23" font-weight="500" fill="#8f8fb0">Agar.io 2 · Space Pitfall · Plushy Quest · Digital Circus</text>

  <!-- four game-shape chips (circle / diamond / heart / hexagon) -->
