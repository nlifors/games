<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Space Grotesk', 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15101f"/>
      <stop offset="1" stop-color="#241a3a"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16c79a"/>
      <stop offset="1" stop-color="#2f6bff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- brand mark -->
  <rect x="90" y="120" width="64" height="64" rx="16" fill="url(#mark)"/>
  <path d="M122 169 C 109 156 106 148 111 143 C 115 140 120 142 122 146 C 124 142 129 140 133 143 C 138 148 135 156 122 169 Z" fill="#fff"/>

  <!-- wordmark + taglines -->
